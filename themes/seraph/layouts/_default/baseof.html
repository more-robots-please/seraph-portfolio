<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  {{ with .Site.Params.favicon }}<link rel="icon" href="{{ . }}">{{ end }}
</head>
<body>
  <div class="site-wrapper">
    <header>
      <a class="wordmark" href="/">{{ .Site.Title | lower }}</a>
      <nav>
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">// light</button>
      </nav>
    </header>

    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer>
      <div class="footer-left">{{ .Site.Title | lower }} — built by hand</div>
      <div class="footer-links">
        {{ with .Site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener">github</a>{{ end }}
        <a href="/posts/index.xml">rss</a>
        {{ with .Site.Params.email }}<a href="mailto:{{ . }}">mail</a>{{ end }}
      </div>
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('theme-btn');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = '// dark';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = '// light';
        localStorage.setItem('theme', 'dark');
      }
    }
    // Restore saved theme
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('theme-btn');
      if (btn) btn.textContent = saved === 'light' ? '// dark' : '// light';
    }
  </script>
</body>
</html>
